services:
  web:
    image: nginx:alpine
    container_name: esbg-web
    restart: unless-stopped
    volumes:
      - ./server:/var/www
      - ./docker-nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.esbg.rule=Host(`easyg.duckdns.org`)"
      - "traefik.http.routers.esbg.entrypoints=websecure"
      - "traefik.http.routers.esbg.tls.certresolver=letsencrypt"
      - "traefik.http.services.esbg.loadbalancer.server.port=80"
    networks:
      - default
      - proxy

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: esbg-api
    restart: unless-stopped
    environment:
      - DB_CONNECTION=${DB_CONNECTION}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
    depends_on:
      - db
      - redis
    volumes:
      - ./server:/var/www

  frontend:
    build:
      context: ./client-frontend
      dockerfile: Dockerfile
    container_name: esbg-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV}
    networks:
      - default

  db:
    image: postgres:17-alpine
    container_name: esbg-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - esbg-pg-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: esbg-redis
    restart: unless-stopped
    volumes:
      - esbg-redis-data:/data

  scheduler:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: esbg-scheduler
    restart: unless-stopped
    environment:
      - DB_CONNECTION=${DB_CONNECTION}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
    volumes:
      - ./server:/var/www
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    depends_on:
      - db
      - redis
    networks:
      - default

  backup:
    image: postgres:17-alpine
    container_name: esbg-backup
    restart: unless-stopped
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_DATABASE}
    volumes:
      - /var/www/backups/esbg:/backups
      - ./server/storage/app:/storage:ro
      - ./docker/backup/backup.sh:/backup.sh:ro
      - ./docker/backup/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/entrypoint.sh"]
    depends_on:
      - db
    networks:
      - default

volumes:
  esbg-pg-data:
  esbg-redis-data:

networks:
  default:
  proxy:
    external: true
